name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# peaceiris/actions-gh-pages pushes to gh-pages on the user-site repo only.
permissions:
  contents: write

# One deploy at a time; cancel stale runs so rapid pushes do not stack.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro check
        run: npm run check

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Build site
        run: npm run build

      - name: Publish to GitHub Pages
        if: github.repository == 'balajiselvaraj1601/balajiselvaraj1601.github.io'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
